appId: jm.gov.coa.claw
productName: CLAW
copyright: Copyright (c) 2025 Court of Appeal, Jamaica

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - public/**/*
  - "package.json"
  - "!**/*.{ts,tsx,map,md}"
  - "!{tsconfig.json,tsconfig.node.json,vite.config.ts,tailwind.config.js,postcss.config.js,electron-builder.yml,.gitignore}"
  - "!legacy${/*}"
  - "!src${/*}"

asarUnpack:
  - "node_modules/better-sqlite3/**/*"

extraResources:
  - from: public
    to: public
    filter: ["**/*"]

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "CLAW-Setup-${version}.${ext}"
  publisherName: "Court of Appeal, Jamaica"
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: CLAW
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  artifactName: "CLAW-Setup-${version}.${ext}"
  uninstallDisplayName: "CLAW v${version}"
  license: build/license.txt
  include: build/installer.nsh

publish: null

asar: true
compression: maximum

extraMetadata:
  main: electron/main.cjs
