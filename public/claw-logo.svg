<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#1A1E2E"/>
    </linearGradient>
  </defs>
  <!-- Scales of Justice integrated with CLAW letterforms -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central pillar -->
    <line x1="24" y1="10" x2="24" y2="38" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Cross bar -->
    <line x1="12" y1="10" x2="36" y2="10" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Left scale pan -->
    <path d="M12 10 L8 18 L16 18 Z" fill="none" stroke="#D4A843" stroke-width="1.2"/>
    <line x1="12" y1="10" x2="8" y2="18" stroke="#D4A843" stroke-width="1"/>
    <line x1="12" y1="10" x2="16" y2="18" stroke="#D4A843" stroke-width="1"/>
    <!-- Right scale pan -->
    <path d="M36 10 L32 18 L40 18 Z" fill="none" stroke="#D4A843" stroke-width="1.2"/>
    <line x1="36" y1="10" x2="32" y2="18" stroke="#D4A843" stroke-width="1"/>
    <line x1="36" y1="10" x2="40" y2="18" stroke="#D4A843" stroke-width="1"/>
    <!-- Base -->
    <rect x="18" y="38" width="12" height="3" rx="1" fill="#D4A843" stroke="none"/>
    <!-- C letterform (left arc) -->
    <path d="M24 4 A8 8 0 0 0 16 12" stroke="#D4A843" stroke-width="1.5" fill="none"/>
    <!-- L letterform (left vertical) -->
    <line x1="16" y1="12" x2="16" y2="28" stroke="#D4A843" stroke-width="1.5"/>
    <!-- A letterform (right diagonal) -->
    <line x1="30" y1="28" x2="34" y2="12" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="32" y1="20" x2="36" y2="20" stroke="#D4A843" stroke-width="1.5"/>
    <!-- W letterform (bottom right) -->
    <polyline points="30,28 32,36 34,32 36,36 38,28" stroke="#D4A843" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Subtle glow dot at center -->
  <circle cx="24" cy="24" r="2" fill="#0D9488" opacity="0.8"/>
</svg>