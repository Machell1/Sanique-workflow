<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- Dark background -->
  <rect width="300" height="200" fill="#0A0A0F" rx="12"/>
  <!-- Dashed outline suggesting drag-and-drop zone -->
  <rect x="60" y="30" width="180" height="140" rx="8" fill="none" stroke="#2A2E3F" stroke-width="2" stroke-dasharray="8 6"/>
  <!-- Document icon -->
  <g transform="translate(130,65)" fill="none" stroke="#4A4E63" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 0 L35 0 L35 50 L5 50 L5 15 Z" fill="#1A1E2E"/>
    <path d="M20 0 L20 15 L5 15"/>
    <!-- Folded corner -->
    <path d="M20 0 L35 0 L35 15 L20 15 Z" fill="#2A2E3F"/>
    <!-- Lines on document -->
    <line x1="12" y1="24" x2="28" y2="24" stroke="#4A4E63" stroke-width="1.5"/>
    <line x1="12" y1="32" x2="24" y2="32" stroke="#4A4E63" stroke-width="1.5"/>
    <line x1="12" y1="40" x2="20" y2="40" stroke="#4A4E63" stroke-width="1.5"/>
  </g>
  <!-- Upload arrow -->
  <g transform="translate(150, 118)">
    <line x1="0" y1="12" x2="0" y2="-8" stroke="#4A4E63" stroke-width="2" stroke-linecap="round"/>
    <polyline points="-6,-2 0,-8 6,-2" stroke="#4A4E63" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Subtle glow -->
  <circle cx="150" cy="100" r="40" fill="rgba(59,130,246,0.05)"/>
  <!-- Text hint -->
  <text x="150" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#4A4E63">Drag and drop files here</text>
</svg>