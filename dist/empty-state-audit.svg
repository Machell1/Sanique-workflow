<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- Dark background -->
  <rect width="300" height="200" fill="#0A0A0F" rx="12"/>
  <!-- Scroll / ledger illustration -->
  <g transform="translate(90, 40)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Scroll roll top -->
    <ellipse cx="20" cy="10" rx="15" ry="6" fill="#1A1E2E" stroke="#2A2E3F" stroke-width="1.5"/>
    <!-- Scroll body -->
    <rect x="5" y="10" width="100" height="110" rx="2" fill="#0D1117" stroke="#2A2E3F" stroke-width="1.5"/>
    <!-- Scroll roll bottom -->
    <ellipse cx="20" cy="120" rx="15" ry="6" fill="#1A1E2E" stroke="#2A2E3F" stroke-width="1.5"/>
    <!-- Ledger lines -->
    <line x1="18" y1="25" x2="95" y2="25" stroke="#2A2E3F" stroke-width="1"/>
    <line x1="18" y1="40" x2="95" y2="40" stroke="#2A2E3F" stroke-width="1"/>
    <line x1="18" y1="55" x2="95" y2="55" stroke="#2A2E3F" stroke-width="1"/>
    <line x1="18" y1="70" x2="95" y2="70" stroke="#2A2E3F" stroke-width="1"/>
    <line x1="18" y1="85" x2="95" y2="85" stroke="#2A2E3F" stroke-width="1"/>
    <line x1="18" y1="100" x2="95" y2="100" stroke="#2A2E3F" stroke-width="1"/>
    <!-- Hash chain links -->
    <g stroke="#D4A843" stroke-width="1.5" opacity="0.6">
      <rect x="22" y="28" width="16" height="8" rx="2" fill="none"/>
      <rect x="42" y="28" width="16" height="8" rx="2" fill="none"/>
      <line x1="38" y1="32" x2="42" y2="32"/>
      
      <rect x="22" y="43" width="16" height="8" rx="2" fill="none" opacity="0.5"/>
      <rect x="42" y="43" width="16" height="8" rx="2" fill="none" opacity="0.5"/>
      <line x1="38" y1="47" x2="42" y2="47" opacity="0.5"/>
      
      <rect x="22" y="58" width="16" height="8" rx="2" fill="none" opacity="0.4"/>
      <rect x="42" y="58" width="16" height="8" rx="2" fill="none" opacity="0.4"/>
      <line x1="38" y1="62" x2="42" y2="62" opacity="0.4"/>
    </g>
  </g>
  <!-- Subtle gold glow -->
  <circle cx="150" cy="100" r="50" fill="rgba(245,158,11,0.03)"/>
  <!-- Text hint -->
  <text x="150" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#4A4E63">Immutable audit trail</text>
</svg>